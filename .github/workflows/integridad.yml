name: Integridad MPA

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validar-pos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ejecutar modelo
        run: python src/modelo_meridiano.py --validar-integridad

      - name: Validar test de integridad
        run: python -m unittest -q tests/test_modelo_meridiano.py
